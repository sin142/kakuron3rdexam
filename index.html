<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心理学研究法・心理検査法 完全定着クイズ</title>
<style>
  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    background-color: #f0f4f8;
    color: #333;
    line-height: 1.6;
    margin: 0;
    padding: 20px;
  }
  .container {
    max-width: 700px;
    margin: 0 auto;
    background: #ffffff;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 8px 16px rgba(0,0,0,0.1);
  }
  h1 {
    font-size: 1.5rem;
    color: #2c3e50;
    text-align: center;
    margin-bottom: 20px;
    border-bottom: 2px solid #3498db;
    padding-bottom: 10px;
  }
  .status-bar {
    display: flex;
    justify-content: space-between;
    font-weight: bold;
    margin-bottom: 20px;
    font-size: 1.1rem;
    color: #555;
  }
  .question-text {
    font-size: 1.2rem;
    font-weight: bold;
    margin-bottom: 20px;
  }
  .options-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .option-item {
    background: #f8fafc;
    border: 2px solid #e2e8f0;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-size: 1.05rem;
  }
  .option-item:hover {
    background: #e2e8f0;
    border-color: #cbd5e1;
  }
  .option-item.correct {
    background: #d1fae5;
    border-color: #10b981;
    color: #047857;
  }
  .option-item.incorrect {
    background: #fee2e2;
    border-color: #ef4444;
    color: #b91c1c;
  }
  .option-item.disabled {
    pointer-events: none;
  }
  .result-area {
    margin-top: 20px;
    display: none;
  }
  .result-label {
    font-size: 1.3rem;
    font-weight: bold;
    margin-bottom: 10px;
  }
  .explanation {
    background: #e0f2fe;
    padding: 15px;
    border-radius: 8px;
    color: #0369a1;
    margin-bottom: 20px;
  }
  .btn {
    display: block;
    width: 100%;
    padding: 15px;
    background: #3498db;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.3s;
  }
  .btn:hover {
    background: #2980b9;
  }
  .finish-area {
    text-align: center;
    display: none;
  }
  .finish-area h2 {
    color: #2c3e50;
  }
  .score-display {
    font-size: 2rem;
    color: #e74c3c;
    font-weight: bold;
    margin: 20px 0;
  }
</style>
</head>
<body>

<div class="container">
  <h1>心理学研究法・心理検査法 完全定着クイズ</h1>
  
  <div id="quiz-screen">
    <div class="status-bar">
      <div>問題: <span id="current-question-num">1</span> / 25</div>
      <div>正解数: <span id="score-counter">0</span></div>
    </div>
    <div class="question-text" id="question-text"></div>
    <ul class="options-list" id="options-list"></ul>
    
    <div class="result-area" id="result-area">
      <div class="result-label" id="result-label"></div>
      <div class="explanation" id="explanation-text"></div>
      <button class="btn" id="next-btn" onclick="nextQuestion()">次の問題へ進む</button>
    </div>
  </div>

  <div class="finish-area" id="finish-screen">
    <h2>全25問が終了しました！</h2>
    <p>あなたの最終スコアは...</p>
    <div class="score-display"><span id="final-score"></span> / 25 点</div>
    <button class="btn" onclick="location.reload()">最初からもう一度挑戦する</button>
  </div>
</div>

<script>
  const quizData = [
    { q: "質問紙法のデメリットとして最も適切なものはどれか。", options: ["実施と分析に熟練を要し、主観が入りやすい。", "社会的望ましさ（よく見せようとするバイアス）の影響を受ける。", "検査結果がその人の全てであるというラベリングの危険性がある。", "生態学的妥当性に限界がある。"], ans: 1, exp: "質問紙法は、対象者が自分をよく見せようとする「社会的望ましさ」の影響を受けやすいという欠点があります。" },
    { q: "変数間の「因果関係」を厳密に証明できる研究手法はどれか。", options: ["質問紙法", "面接法", "観察法", "実験法"], ans: 3, exp: "実験法は独立変数（原因）を操作し、従属変数（結果）への影響を測定することで因果関係を証明できます。" },
    { q: "観察法を適用する対象として、最も適しているものはどれか。", options: ["過去のトラウマについて深く語りたい成人", "言語化が難しい乳幼児や動物", "統計処理のために数千人規模のデータを集めたい集団", "無意識の葛藤や欲求を読み取りたい対象者"], ans: 1, exp: "観察法は、行動を直接記録するため、言語を介さない対象（乳幼児や動物など）に有効です。" },
    { q: "面接法の特徴として正しい記述はどれか。", options: ["質問紙では得られない深い背景や感情を捉えられるが、主観が入りやすい。", "標準化された尺度を用いるため、客観的な比較や定量化が容易である。", "対象者の行動を自然状態で記録するため、対象者の行動を変える可能性はない。", "独立変数を操作し、従属変数の変化を測る。"], ans: 0, exp: "面接法は深い情報が得られる反面、実施者の熟練度が必要で主観が入りやすい点に注意が必要です。" },
    { q: "遠城寺式乳幼児分析的発達検査の対象年齢はどれか。", options: ["0歳〜4歳7ヶ月", "3歳〜10歳", "小学生〜中学生", "幼児〜高齢者"], ans: 0, exp: "遠城寺式乳幼児分析的発達検査の対象年齢は「0歳〜4歳7ヶ月」です。" },
    { q: "この検査で測定される「3つの分野」の組み合わせとして正しいものはどれか。", options: ["運動、知能、感情", "運動、社会性、言語", "身体、精神、道徳", "移動運動、手の運動、発語"], ans: 1, exp: "運動、社会性、言語の3分野（6つの測定領域）から発達状況を捉えます。" },
    { q: "「基本的習慣（食事、排泄など）」と「対人関係」が含まれる分野はどれか。", options: ["運動", "社会性", "言語", "構成力"], ans: 1, exp: "これらは「社会性」の分野に分類されます。" },
    { q: "遠城寺式乳幼児分析的発達検査の結果解釈の最大の特徴はどれか。", options: ["IQを算出する。", "発達プロフィールを作成し、発達のアンバランスさを視覚的に把握する。", "自我状態のエネルギー量から性格を分類する。", "絵の細部を51項目の基準で点数化する。"], ans: 1, exp: "折れ線グラフ（プロフィール）を作成し、得意・不得意などの個人内差を視覚的に把握できる点が最大の特徴です。" },
    { q: "TEG（東大式エゴグラム）の基となっている理論はどれか。", options: ["交流分析", "精神分析", "行動分析", "発達理論"], ans: 0, exp: "TEGは、エリック・バーンが提唱した「交流分析」の理論に基づいています。" },
    { q: "TEGにおける「A（合理的な大人）」が高い場合の特徴はどれか。", options: ["責任感が強い、批判的", "面倒見が良い、過保護", "冷静、現実的、計算高い", "活発、創造的、自己中心的"], ans: 2, exp: "A（合理的な大人）が高いと、冷静で現実的、論理的な傾向が強くなります。" },
    { q: "「CPとACが高く、理想が高く周囲の目を気にするためストレスを抱えやすい」プロフィール類型はどれか。", options: ["M型（明朗型）", "N型（献身型）", "W型（葛藤型）", "V型"], ans: 2, exp: "理想（CP）と周囲への順応（AC）の板挟みになるため、葛藤を抱えやすいW型の特徴です。" },
    { q: "投映法の特徴として適切なものはどれか。", options: ["選択式で回答を求めるため、処理が容易である。", "あいまいな刺激に対する反応から、本人が意識していない欲求を読み取る。", "全身の絵を描かせることで、概念形成能力を測定する。", "言語を介さないため、流動性知能の測定に優れている。"], ans: 1, exp: "投映法は、無意識の葛藤や欲求を投影させる手法です。" },
    { q: "TAT（主題統覚検査）の実施方法として正しいものはどれか。", options: ["インクの染みを見て何に見えるかを答える。", "実のなる木を1本描かせる。", "日常的な場面が描かれた絵を見て、過去・現在・未来の物語を作る。", "ブロックを組み合わせて同じ模様を作る。"], ans: 2, exp: "TATは、絵から物語を作らせることで、対象者の欲求や環境からの圧力を分析します。" },
    { q: "「実のなる木を1本描いてください」と指示する検査はどれか。", options: ["TAT", "グッドイナフ人物画知能検査", "ロールシャッハ・テスト", "バウムテスト"], ans: 3, exp: "バウムテストは、木の描画から自己像や精神的発達度を読み取ります。" },
    { q: "グッドイナフ人物画知能検査の主な対象年齢はどれか。", options: ["0歳〜4歳7ヶ月", "3歳〜10歳（または12歳頃まで）", "15歳〜成人", "幼児〜高齢者"], ans: 1, exp: "概念形成能力を測定するグッドイナフの対象は主に3歳〜10歳です。" },
    { q: "グッドイナフ人物画知能検査の採点基準について正しいものはどれか。", options: ["絵の芸術的な上手さで採点する。", "描画にかかった時間でIQを算出する。", "「頭があるか」など、51項目の基準の有無で客観的に点数化する。", "幹の太さや枝の広がりから採点する。"], ans: 2, exp: "芸術性ではなく、身体の部位や衣服などの細部が描かれているか（51項目）で客観的に採点します。" },
    { q: "グッドイナフ人物画知能検査において、IQを算出する公式はどれか。", options: ["IQ = (生活年齢 ÷ 精神年齢) × 100", "IQ = (精神年齢 ÷ 生活年齢) × 100", "IQ = (生活年齢 × 100) ÷ 精神年齢", "IQ = (精神年齢 × 生活年齢) ÷ 100"], ans: 1, exp: "IQ = (MA:精神年齢 ÷ CA:生活年齢) × 100 で算出されます。" },
    { q: "コース立方体組み合わせテストで使用される検査用具はどれか。", options: ["インクの染みが描かれたカード", "日常的な場面が描かれた絵", "画用紙", "各面が塗り分けられた1辺3cmのブロック"], ans: 3, exp: "赤・白・青・黄などに塗り分けられた立方体ブロックを使用します。" },
    { q: "コース立方体組み合わせテストで測定される主な能力はどれか。", options: ["無意識の欲求", "言語理解能力", "空間認識、視覚・運動協応、構成力", "対人関係能力"], ans: 2, exp: "言語を用いず、空間認識や構成力などの「流動性知能」を測定します。" },
    { q: "コース立方体組み合わせテストの利点として適切なものはどれか。", options: ["高次脳機能障害や認知症のスクリーニングにも用いられる。", "乳幼児の発達のアンバランスさを視覚的に把握できる。", "性格の傾向を可視化できる。", "数千人規模に一度に実施できる。"], ans: 0, exp: "言語や文化の影響を受けにくいため、高齢者の認知機能低下の評価などにも有効です。" },
    { q: "「基本的な質問項目は用意しつつ、回答に応じて深掘りを行う」面接手法はどれか。", options: ["構造化面接", "半構造化面接", "非構造化面接", "調査的面接"], ans: 1, exp: "半構造化面接は、ある程度の枠組みと柔軟性を兼ね備えた手法です。" },
    { q: "質的調査において最も多用される面接の構造化レベルはどれか。", options: ["構造化面接", "半構造化面接", "非構造化面接", "完全構造化面接"], ans: 1, exp: "柔軟に文脈や感情を掘り下げられるため、半構造化面接が最も多用されます。" },
    { q: "「未知の事象の探索に適しているが、データの比較が難しい」面接手法はどれか。", options: ["構造化面接", "半構造化面接", "非構造化面接", "観察的面接"], ans: 2, exp: "非構造化面接は自由な対話を行うため、探索的ですが標準化には不向きです。" },
    { q: "面接法において、対象者が安心して本音を語れる関係性を指す用語はどれか。", options: ["プロービング", "ラベリング", "エゴグラム", "ラポール"], ans: 3, exp: "ラポール（信頼関係）の形成は、面接において不可欠な技術です。" },
    { q: "面接者が自分の仮説に沿った回答を引き出してしまう質問を何と呼ぶか。", options: ["構造化質問", "誘導尋問", "深掘り（プロービング）", "半構造化質問"], ans: 1, exp: "「〜ですよね？」といった誘導尋問は、客観的なデータ収集を妨げるため避けるべきです。" }
  ];

  let currentQuestionIndex = 0;
  let score = 0;
  let hasAnswered = false;

  const questionText = document.getElementById('question-text');
  const optionsList = document.getElementById('options-list');
  const currentNumDisplay = document.getElementById('current-question-num');
  const scoreCounter = document.getElementById('score-counter');
  const resultArea = document.getElementById('result-area');
  const resultLabel = document.getElementById('result-label');
  const explanationText = document.getElementById('explanation-text');
  const quizScreen = document.getElementById('quiz-screen');
  const finishScreen = document.getElementById('finish-screen');
  const finalScoreDisplay = document.getElementById('final-score');

  function loadQuestion() {
    hasAnswered = false;
    resultArea.style.display = 'none';
    currentNumDisplay.textContent = currentQuestionIndex + 1;
    
    const currentQ = quizData[currentQuestionIndex];
    questionText.textContent = `Q${currentQuestionIndex + 1}. ${currentQ.q}`;
    
    optionsList.innerHTML = '';
    currentQ.options.forEach((option, index) => {
      const li = document.createElement('li');
      li.className = 'option-item';
      li.textContent = option;
      li.onclick = () => selectOption(index, li);
      optionsList.appendChild(li);
    });
  }

  function selectOption(selectedIndex, selectedElement) {
    if (hasAnswered) return;
    hasAnswered = true;

    const currentQ = quizData[currentQuestionIndex];
    const isCorrect = (selectedIndex === currentQ.ans);

    // Disable all options and show correct/incorrect colors
    const allOptions = optionsList.children;
    for (let i = 0; i < allOptions.length; i++) {
      allOptions[i].classList.add('disabled');
      if (i === currentQ.ans) {
        allOptions[i].classList.add('correct');
      }
    }

    if (isCorrect) {
      score++;
      scoreCounter.textContent = score;
      resultLabel.textContent = "⭕ 正解！";
      resultLabel.style.color = "#10b981";
    } else {
      selectedElement.classList.add('incorrect');
      resultLabel.textContent = "❌ 不正解...";
      resultLabel.style.color = "#ef4444";
    }

    explanationText.textContent = currentQ.exp;
    resultArea.style.display = 'block';

    // Change button text if it's the last question
    if (currentQuestionIndex === quizData.length - 1) {
      document.getElementById('next-btn').textContent = "結果を見る";
    }
  }

  function nextQuestion() {
    currentQuestionIndex++;
    if (currentQuestionIndex < quizData.length) {
      loadQuestion();
    } else {
      showResults();
    }
  }

  function showResults() {
    quizScreen.style.display = 'none';
    finishScreen.style.display = 'block';
    finalScoreDisplay.textContent = score;
  }

  // Initialize
  loadQuestion();
</script>
</body>
</html>
